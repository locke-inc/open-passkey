[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "open-passkey-flask"
version = "0.1.3"
description = "Flask blueprint for open-passkey WebAuthn/FIDO2 authentication"
readme = "README.md"
license = {text = "MIT"}
authors = [{name = "Locke Identity Networks Inc."}]
keywords = ["passkey", "webauthn", "fido2", "flask"]
classifiers = [
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Framework :: Flask",
    "Topic :: Security",
]
requires-python = ">=3.10"
dependencies = [
    "flask>=3.0",
    "open-passkey-server",
]

[project.urls]
Homepage = "https://github.com/locke-inc/open-passkey"
Repository = "https://github.com/locke-inc/open-passkey"

[tool.setuptools]
packages = ["open_passkey_flask"]

[project.optional-dependencies]
dev = ["pytest", "pytest-flask"]
