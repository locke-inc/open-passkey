[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "open-passkey-flask"
version = "0.1.0"
description = "Flask blueprint for open-passkey WebAuthn/FIDO2 authentication"
requires-python = ">=3.10"
dependencies = [
    "flask>=3.0",
    "open-passkey-core",
]

[project.optional-dependencies]
dev = ["pytest", "pytest-flask"]
