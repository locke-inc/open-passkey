[package]
name = "open-passkey-axum"
version = "0.1.3"
edition = "2021"
description = "Axum handlers for open-passkey WebAuthn/FIDO2 authentication"
license = "MIT"
repository = "https://github.com/locke-inc/open-passkey"
homepage = "https://github.com/locke-inc/open-passkey"
keywords = ["passkey", "webauthn", "fido2", "axum"]
categories = ["authentication", "web-programming"]

[dependencies]
axum = { version = "0.7", features = ["json"] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
base64 = "0.22"
rand = "0.8"
open-passkey-core = "0.1.0"
tracing = "0.1"
thiserror = "1"
hmac = "0.12"
sha2 = "0.10"
