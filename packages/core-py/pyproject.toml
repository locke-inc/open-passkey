[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "open-passkey"
version = "0.1.3"
description = "Core WebAuthn protocol verification library (ES256, ML-DSA-65, ML-DSA-65-ES256 composite)"
readme = "README.md"
license = {text = "MIT"}
authors = [{name = "Locke Identity Networks Inc."}]
keywords = ["passkey", "webauthn", "fido2", "post-quantum", "mldsa"]
classifiers = [
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Security",
]
requires-python = ">=3.10"

[project.urls]
Homepage = "https://github.com/locke-inc/open-passkey"
Repository = "https://github.com/locke-inc/open-passkey"
dependencies = [
    "cryptography>=41.0",
    "cbor2>=5.4",
]

[project.optional-dependencies]
pq = ["liboqs-python>=0.14"]
dev = ["pytest>=9.0.3"]

[tool.pytest.ini_options]
testpaths = ["tests"]
