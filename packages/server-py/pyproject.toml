[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "open-passkey-server"
version = "0.1.3"
description = "Shared server logic for open-passkey WebAuthn/FIDO2 authentication"
readme = "README.md"
license = {text = "MIT"}
authors = [{name = "Locke Identity Networks Inc."}]
keywords = ["passkey", "webauthn", "fido2", "server"]
classifiers = [
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Security",
]
requires-python = ">=3.10"
dependencies = [
    "open-passkey",
]

[project.urls]
Homepage = "https://github.com/locke-inc/open-passkey"
Repository = "https://github.com/locke-inc/open-passkey"

[tool.setuptools]
packages = ["open_passkey_server"]
