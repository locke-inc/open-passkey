[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "open-passkey-django"
version = "0.1.0"
description = "Django views for open-passkey WebAuthn/FIDO2 authentication"
requires-python = ">=3.10"
dependencies = [
    "django>=4.2",
    "open-passkey-core",
]

[project.optional-dependencies]
dev = ["pytest", "pytest-django"]
