[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "open-passkey-django"
version = "0.1.3"
description = "Django views for open-passkey WebAuthn/FIDO2 authentication"
readme = "README.md"
license = {text = "MIT"}
authors = [{name = "Locke Identity Networks Inc."}]
keywords = ["passkey", "webauthn", "fido2", "django"]
classifiers = [
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Framework :: Django",
    "Topic :: Security",
]
requires-python = ">=3.10"

[project.urls]
Homepage = "https://github.com/locke-inc/open-passkey"
Repository = "https://github.com/locke-inc/open-passkey"
dependencies = [
    "django>=4.2",
    "open-passkey-server",
]

[tool.setuptools]
packages = ["open_passkey_django"]

[project.optional-dependencies]
dev = ["pytest", "pytest-django"]
