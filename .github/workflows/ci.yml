name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  core-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Test core-go
        run: cd packages/core-go && go test ./webauthn/ -v -race
      - name: Test server-go
        run: cd packages/server-go && go test ./... -v -race
      - name: Vulnerability check (core-go)
        run: cd packages/core-go && govulncheck ./...
      - name: Vulnerability check (server-go)
        run: cd packages/server-go && govulncheck ./...

  core-ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Test core-ts
        run: cd packages/core-ts && npm ci && npm test
      - name: Test authenticator-ts
        run: cd packages/authenticator-ts && npm ci && npm test
      - name: Test sdk-js
        run: cd packages/sdk-js && npm ci && npm test
      - name: Test angular
        run: cd packages/angular && npm ci && npm test
      - name: Audit core-ts
        run: cd packages/core-ts && npm audit --omit=dev
      - name: Audit sdk-js
        run: cd packages/sdk-js && npm audit --omit=dev

  core-py:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install and test core-py
        run: cd packages/core-py && pip install -e ".[dev]" && pytest tests/ -v
      - name: Audit dependencies
        run: pip install pip-audit && pip-audit

  core-java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
      - name: Test core-java
        run: cd packages/core-java && mvn test -B

  core-dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Test core-dotnet
        run: cd packages/core-dotnet && dotnet test Tests/ -v normal

  core-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Test core-rust
        run: cd packages/core-rust && cargo test -- --nocapture
      - name: Install and run cargo-audit
        run: cargo install cargo-audit && cd packages/core-rust && cargo audit
