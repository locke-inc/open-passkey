name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  core-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Test core-go
        run: cd packages/core-go && go test ./webauthn/ -v -race
      - name: Test server-go
        run: cd packages/server-go && go test ./... -v -race
      - name: Vulnerability check (core-go)
        run: cd packages/core-go && govulncheck ./...
      - name: Vulnerability check (server-go)
        run: cd packages/server-go && govulncheck ./...

  core-ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Test and build core-ts
        run: cd packages/core-ts && npm ci && npm test && npm run build
      - name: Test authenticator-ts
        run: cd packages/authenticator-ts && npm ci && npm test
      - name: Build sdk-js
        run: cd packages/sdk-js && npm ci && npm run build
      - name: Test sdk-js
        run: cd packages/sdk-js && npm test
      - name: Test server-ts
        run: cd packages/server-ts && npm ci && npm test
      - name: Test angular
        run: cd packages/angular && npm ci && npm test
      - name: Audit core-ts
        run: cd packages/core-ts && npm audit --omit=dev
      - name: Audit sdk-js
        run: cd packages/sdk-js && npm audit --omit=dev

  core-py:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Cache liboqs
        id: cache-liboqs
        uses: actions/cache@v5
        with:
          path: ~/_oqs
          key: liboqs-67b35f20
      - name: Build and install liboqs
        # liboqs-python 0.14.1 expects symbols not present in any tagged liboqs release,
        # so we pin to a known-good commit on main. When upgrading liboqs-python, update:
        #   1. The commit SHA below
        #   2. The cache key above (liboqs-<short-sha>)
        if: steps.cache-liboqs.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update && sudo apt-get install -y cmake ninja-build libssl-dev
          git clone https://github.com/open-quantum-safe/liboqs.git /tmp/liboqs
          cd /tmp/liboqs && git checkout 67b35f20815b5d735359ca67050c6f59cc2eb26a
          cmake -S /tmp/liboqs -B /tmp/liboqs/build -G Ninja -DBUILD_SHARED_LIBS=ON -DCMAKE_INSTALL_PREFIX=$HOME/_oqs
          ninja -C /tmp/liboqs/build
          ninja -C /tmp/liboqs/build install
      - name: Install and test core-py
        run: cd packages/core-py && pip install -e ".[dev,pq]" && pytest tests/ -v
      - name: Test server-py
        run: pip install -e packages/server-py && cd packages/server-py && pytest tests/ -v
      - name: Audit dependencies
        run: pip install pip-audit && pip-audit

  core-java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
      - name: Test and install core-java
        run: cd packages/core-java && mvn install -B
      - name: Test server-spring
        run: cd packages/server-spring && mvn test -B

  core-dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Test core-dotnet
        run: cd packages/core-dotnet && dotnet test Tests/ -v normal
      - name: Test server-aspnet
        run: cd packages/server-aspnet/tests && dotnet test -v normal

  core-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Test core-rust
        run: cd packages/core-rust && cargo test -- --nocapture
      - name: Test server-axum
        run: cd packages/server-axum && cargo test -- --nocapture
      - name: Install and run cargo-audit
        run: cargo install cargo-audit && cd packages/core-rust && cargo audit

  e2e:
    runs-on: ubuntu-latest
    needs: [core-go, core-ts, core-py]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Build TS packages (Express example and E2E harness depend on these via file: links)
      - name: Build TS dependency chain
        run: |
          cd packages/core-ts && npm ci && npm run build
          cd ../../packages/server-ts && npm ci && npm run build
          cd ../../packages/server-express && npm ci && npm run build
          cd ../../packages/authenticator-ts && npm ci && npm run build
      # Install Node.js dependencies for Express example and E2E harness
      - name: Install E2E deps
        run: cd tests/e2e && npm ci
      - name: Install Express example deps
        run: cd examples/express && npm ci
      # Build Go example binary
      - name: Build Go example
        run: cd examples/nethttp && go mod tidy && go build -o nethttp-e2e .
      # Install Python packages for FastAPI example
      - name: Install Python packages
        run: pip install -e packages/core-py -e packages/server-py -e packages/server-fastapi uvicorn
      # Run E2E tests
      - name: E2E tests
        run: cd tests/e2e && npx vitest run
